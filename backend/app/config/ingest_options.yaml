parsers:
  pymupdf:
    label: "PyMuPDF"
    formats: [pdf]
    params: {}

  pdfplumber:
    label: "pdfplumber"
    formats: [pdf]
    params:
      extract_tables:
        type: boolean
        default: true
        description: "是否将表格转为 Markdown 格式"

  html_reader:
    label: "HTML Reader"
    formats: [html, htm]
    params:
      mode:
        type: enum
        values: [text_only, preserve_structure]
        default: text_only

  docx_reader:
    label: "Word Reader"
    formats: [docx, doc]
    params: {}

  excel_reader:
    label: "Excel Reader"
    formats: [xlsx, xls]
    params:
      mode:
        type: enum
        values: [row_to_text, chunk_by_rows]
        default: row_to_text
      rows_per_chunk:
        type: integer
        default: 50
        min: 10
        max: 500
        description: "chunk_by_rows 模式下每块行数"

  csv_reader:
    label: "CSV Reader"
    formats: [csv]
    params:
      mode:
        type: enum
        values: [row_to_text, chunk_by_rows]
        default: row_to_text
      rows_per_chunk:
        type: integer
        default: 50
        min: 10
        max: 500

  txt_reader:
    label: "Plain Text"
    formats: [txt]
    params: {}

  markdown_reader:
    label: "Markdown"
    formats: [md, markdown]
    params: {}

splitters:
  sentence:
    label: "Sentence Splitter"
    params:
      chunk_size:
        type: integer
        default: 1024
        min: 128
        max: 8192
      chunk_overlap:
        type: integer
        default: 128
        min: 0
        max: 512

  token:
    label: "Token Splitter"
    params:
      chunk_size:
        type: integer
        default: 512
        min: 64
        max: 4096
      chunk_overlap:
        type: integer
        default: 64
        min: 0
        max: 256

  semantic:
    label: "Semantic Splitter"
    params:
      breakpoint_percentile_threshold:
        type: integer
        default: 95
        min: 50
        max: 99
        description: "语义断点阈值，越高分块越少"

  markdown:
    label: "Markdown Node Parser"
    formats_hint: [md, markdown]
    params:
      include_metadata:
        type: boolean
        default: true

